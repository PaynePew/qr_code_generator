version: 2
updates:
  # Python backend deps — one grouped PR per run (avoids per-package PR floods).
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      pip:
        patterns: ["*"]

  # Frontend npm deps — grouped. React majors are held back (18 -> 19 is a
  # deliberate migration, not an automated bump).
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      npm:
        patterns: ["*"]
    ignore:
      # React 19 migration is tracked separately, not auto-bumped.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # tailwind-merge v3 targets Tailwind CSS v4; held until that migration.
      - dependency-name: "tailwind-merge"
        update-types: ["version-update:semver-major"]
      # Held pending a deliberate frontend tooling upgrade (see bead):
      # TypeScript 6 deprecates tsconfig `baseUrl`.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # eslint-plugin-react-hooks v6 adds stricter rules (setState-in-effect,
      # refs-during-render) that flag existing idiomatic code.
      - dependency-name: "eslint-plugin-react-hooks"
        update-types: ["version-update:semver-major"]
      # lucide-react removed the `Github` brand icon (used in Header); breaking
      # changes ship as 0.x minor bumps, so hold all updates until migrated.
      - dependency-name: "lucide-react"

  # GitHub Actions used by the workflows — grouped.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns: ["*"]

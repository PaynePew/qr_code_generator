name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. a new push to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.15

      - name: ruff check
        run: ruff check backend tests

      - name: ruff format --check
        run: ruff format --check backend tests

  migrations:
    name: Migrations (alembic drift)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qr_codes
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qr_codes
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply migrations
        run: alembic upgrade head

      - name: Check models match migrations (no drift)
        # Fails if the SQLAlchemy models would autogenerate a non-empty migration
        # against the upgraded schema — i.e. a migration is missing.
        run: alembic check

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest # has Docker preinstalled for testcontainers (Postgres 16)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (prod + dev for pytest)
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        # SECRET/BASE_URL are self-provided by tests/conftest.py; AWS_* left unset
        # so the storage layer uses the in-memory gateway (no AWS creds needed).
        run: pytest -q

  frontend:
    name: Frontend (typecheck · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright · Chromium)
    runs-on: ubuntu-latest
    # Bring up Postgres as a service container — the same pattern used by the
    # `migrations` job so the health-check idiom is already proven in this repo.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qr_codes
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Backend env — test values only; no real secrets.
      SECRET: e2e-ci-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qr_codes
      BASE_URL: http://localhost:8000
      SESSION_COOKIE_SECURE: "false"
      AWS_S3_BUCKET: ""
      RATE_LIMIT_ENABLED: "false"
      # Playwright reads these to locate the running servers.
      E2E_BASE_URL: http://localhost:5173
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      # ── Python / backend ────────────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        working-directory: .
        run: pip install -r requirements.txt

      - name: Apply migrations + seed demo data
        working-directory: .
        run: |
          alembic upgrade head
          python -m backend.demo_seed

      - name: Start backend (uvicorn)
        working-directory: .
        run: |
          uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          # Wait until the backend /healthz endpoint is ready (up to 30 s).
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/healthz && break
            sleep 1
          done

      # ── Node / frontend ─────────────────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck e2e specs
        run: npm run e2e:typecheck

      - name: Install Playwright browsers (Chromium only, cached)
        run: npx playwright install chromium --with-deps

      - name: Start frontend (vite --mode test)
        run: |
          npm run dev -- --mode test &
          # Wait until Vite is serving (up to 30 s).
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 && break
            sleep 1
          done

      - name: Run Playwright E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

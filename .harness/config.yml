# Generic agent harness configuration for qr_code_generator
# Minimum required keys: image, branch_prefix, tracker.type
# All other keys are optional with sensible defaults.

image: agent-harness:latest

branch_prefix: kanban-issue

tracker:
  type: github
  repo: PaynePew/qr_code_generator

defaults:
  model: claude-sonnet-4-6

agents:
  implement:
    model: claude-sonnet-4-6
    max_turns: 80
  plan:
    model: claude-opus-4-7
    max_turns: 10
  review:
    model: claude-opus-4-7
    max_turns: 30

docs:
  prd_dir: docs/prd
  context: CONTEXT.md
  adr_dir: docs/adr

tests:
  block: pytest backend/ && npm test --prefix frontend

typecheck:
  block: npm run typecheck --prefix frontend

commit:
  style: Conventional Commits (feat/fix/test/docs/chore/refactor). One logical change per commit.
